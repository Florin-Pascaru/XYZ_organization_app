name: xyz_organization_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon_xyz.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3F51B5"
  adaptive_icon_foreground: "assets/icon_xyz.png"

flutter:
  uses-material-design: true
  assets:
    - assets/